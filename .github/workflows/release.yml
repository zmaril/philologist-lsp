name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.7). If running from a tag push, this is ignored."
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      # uv build needs a Python to invoke the build backend; pin one
      # explicitly so we don't hit "no interpreter" on cold runners.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      # On a tag push, force package.json AND server/pyproject.toml to
      # match the tag (sans leading `v`). Skipped for manual
      # workflow_dispatch runs so dev builds keep whatever's checked in.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting all version fields to $VERSION"
          (cd extension && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          # GNU sed on ubuntu-latest. Anchor on the first version = "..." line.
          sed -i '0,/^version = ".*"$/s//version = "'"$VERSION"'"/' server/pyproject.toml
          grep -E '^version' server/pyproject.toml

      - name: Build .vsix (wheel + bundle + package)
        working-directory: extension
        run: vsce package

      - name: Capture packaged filename
        id: vsix
        working-directory: extension
        run: |
          file=$(ls *.vsix | head -n1)
          echo "Packaged $file"
          echo "filename=$file" >> "$GITHUB_OUTPUT"

      - name: Upload .vsix as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: extension/*.vsix
          if-no-files-found: error

      - name: Create GitHub Release
        # Skip the release step on workflow_dispatch runs that don't have
        # an associated tag — those are useful for testing the build.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: extension/*.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Download `${{ steps.vsix.outputs.filename }}` from the assets below, then:

            ```
            code --install-extension ${{ steps.vsix.outputs.filename }}
            ```

            **Requirements**: [`uv`](https://docs.astral.sh/uv/) on PATH.

            **On first activation**, the extension creates a Python virtualenv at `~/.philologist-lsp/venv` and pulls in spaCy, transformers, torch, and friends. Plan for ~3 GB of language-model downloads.
